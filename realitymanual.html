<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reality Manual — Digital Grimoire Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --desk-dark:#100905;
    --desk:#2c1c0e;
    --leather:#2e1f16;
    --leather-edge:#4a3320;
    --paper:#e9dcbd;
    --paper-deep:#d9c79f;
    --ink:#2b2116;
    --ink-faint:#5d4c35;
    --brass:#9c7c3c;
    --rubric:#7a2f1d; /* oxblood red used in medieval rubrication */
    --page-w: min(46vw, calc((100vh - 96px) / 1.32));
    --page-w: min(46vw, calc((100dvh - 96px) / 1.32));
    --page-h: calc(var(--page-w) * 1.32);
    --turn-ms: 900ms;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:hidden;
    background:
      radial-gradient(ellipse 45% 32% at 16% 84%, rgba(125,62,16,.12), transparent 70%),
      radial-gradient(ellipse 38% 30% at 86% 14%, rgba(145,78,22,.09), transparent 70%),
      radial-gradient(ellipse 55% 38% at 72% 92%, rgba(35,16,4,.6), transparent 75%),
      radial-gradient(ellipse 50% 35% at 8% 10%, rgba(30,13,4,.55), transparent 75%),
      radial-gradient(ellipse 120% 90% at 50% 34%, var(--desk) 0%, var(--desk-dark) 78%);
    background-color:var(--desk-dark);
    font-family:'IM Fell English', Georgia, serif;
    color:var(--paper);
    overflow-x:hidden;
    padding:0 2vw 24px;
  }

  /* ambient candlelight flicker on the desk */
  .glow{
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse 60% 45% at 50% 42%, rgba(255,165,70,.1), transparent 70%);
    animation:flicker 7s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{opacity:.85} 40%{opacity:1} 60%{opacity:.75} 80%{opacity:.95}
  }

  header.site{
    flex:1 1 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
    width:100%;
    position:relative;
    text-align:center;
    margin:0;
    user-select:none;
  }
  header.site h1{
    font-family:'IM Fell English SC', Georgia, serif;
    font-weight:400;
    font-size:clamp(1rem, 2vw, 1.5rem);
    letter-spacing:.35em;
    text-indent:.35em;
    color:var(--brass);
  }
  header.site p{
    font-style:italic;
    font-size:.78rem;
    color:#8a7452;
    margin-top:.3em;
    letter-spacing:.08em;
  }

  /* ============ THE BOOK ============ */
  .book-wrap{
    perspective:2600px;
    position:relative;
  }
  .book{
    position:relative;
    display:flex;
    align-items:center;
    height:var(--page-h);
    /* leather cover peeking out beneath the pages */
    background:
      linear-gradient(160deg, var(--leather-edge), var(--leather) 40%, #1d130c);
    border-radius:6px 10px 10px 6px;
    padding:14px;
    box-shadow:
      0 40px 80px -20px rgba(0,0,0,.85),
      0 8px 24px rgba(0,0,0,.6),
      inset 0 0 0 1px rgba(156,124,60,.25);
  }
  /* tooled border on the visible cover edge */
  .book::before{
    content:""; position:absolute; inset:5px;
    border:1px solid rgba(156,124,60,.35);
    border-radius:5px;
    pointer-events:none;
  }
  /* stacked page edges at left and right */
  .book::after{
    content:""; position:absolute; top:14px; bottom:14px; left:8px; right:8px;
    background:
      repeating-linear-gradient(90deg, transparent 0 3px, rgba(0,0,0,.12) 3px 4px);
    border-radius:3px;
    pointer-events:none; opacity:.0;
  }

  /* ============ GILDED PAGE BLOCK (the tome's thickness) ============ */
  .pages-wrap{
    position:relative;
    display:flex;
    flex:none;
    height:calc(var(--page-h) - 28px);
    z-index:2;
  }
  .stack{
    flex:none;
    align-self:center;
    width:34px;                        /* fixed slot: layout never shifts */
    height:calc(var(--page-h) - 28px); /* flush with the open pages */
    position:relative;
  }
  .stack .fill{
    position:absolute; top:0; bottom:0;
    width:26px;                        /* JS varies this, slightly */
    transition:width var(--turn-ms) cubic-bezier(.45,.05,.3,1);
    /* gilt edges: fine vertical leaves + top sheen + bottom shade */
    background:
      linear-gradient(180deg, rgba(255,246,216,.5), rgba(255,246,216,0) 10%,
                      rgba(255,236,190,.1) 55%, rgba(60,38,10,.38) 98%),
      repeating-linear-gradient(90deg,
        #a3762f 0 1px, #e7c477 1px 2px, #caa04f 2px 3px, #f0d38c 3px 4px);
    box-shadow:
      inset 0 5px 8px -6px rgba(255,250,225,.85),
      inset 0 -7px 10px -7px rgba(35,20,3,.8);
  }
  /* a few heavier leaves so the block reads as stacked paper, not texture */
  .stack .fill::after{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(90deg,
      transparent 0 7px, rgba(110,76,24,.22) 7px 8px, transparent 8px 15px);
    mix-blend-mode:multiply;
  }
  .stack.left .fill{
    right:0;
    border-radius:2px 0 0 2px;
    box-shadow:
      inset 0 5px 8px -6px rgba(255,250,225,.85),
      inset 0 -7px 10px -7px rgba(35,20,3,.8),
      inset -5px 0 6px -5px rgba(55,32,6,.5);
  }
  .stack.right .fill{
    left:0;
    border-radius:0 2px 2px 0;
    box-shadow:
      inset 0 5px 8px -6px rgba(255,250,225,.85),
      inset 0 -7px 10px -7px rgba(35,20,3,.8),
      inset 5px 0 6px -5px rgba(55,32,6,.5);
  }

  /* the gutter: pages curving down into the binding at the centre */
  .spine{
    position:absolute; top:0; bottom:0; left:50%;
    width:calc(var(--page-w) * .22);
    transform:translateX(-50%);
    z-index:3; pointer-events:none;
    background:linear-gradient(90deg,
      transparent 0%,
      rgba(80,48,16,.06) 18%,
      rgba(62,36,12,.16) 34%,
      rgba(44,24,7,.34) 44%,
      rgba(22,11,3,.58) 48.6%,
      rgba(12,6,1,.68) 50%,
      rgba(22,11,3,.58) 51.4%,
      rgba(44,24,7,.34) 56%,
      rgba(62,36,12,.16) 66%,
      rgba(80,48,16,.06) 82%,
      transparent 100%);
  }
  /* faint sheen where each page curls back up out of the valley */
  .spine::before, .spine::after{
    content:""; position:absolute; top:0; bottom:0; width:1px;
    background:linear-gradient(180deg,
      rgba(255,242,205,.0), rgba(255,242,205,.12) 20%,
      rgba(255,242,205,.12) 80%, rgba(255,242,205,.0));
  }
  .spine::before{ left:26%; }
  .spine::after{ right:26%; }

  .page{
    position:relative;
    width:var(--page-w);
    height:calc(var(--page-h) - 28px);
    background:var(--paper);
    overflow:hidden;
    flex:none;
  }
  .page.left{ border-radius:4px 0 0 4px;
    box-shadow:inset -14px 0 22px -16px rgba(60,40,10,.35);}
  .page.right{ border-radius:0 4px 4px 0;
    box-shadow:inset 14px 0 22px -16px rgba(60,40,10,.35);}

  /* aged paper: stains + grain, all CSS/SVG, no images */
  .parchment{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 40% 30% at 12% 8%, rgba(150,110,50,.16), transparent 70%),
      radial-gradient(ellipse 30% 24% at 92% 88%, rgba(140,95,40,.18), transparent 70%),
      radial-gradient(ellipse 55% 45% at 70% 20%, rgba(160,120,60,.08), transparent 70%),
      radial-gradient(ellipse 120% 120% at 50% 50%, var(--paper) 55%, var(--paper-deep) 100%);
  }
  .grain{ position:absolute; inset:0; opacity:.5; mix-blend-mode:multiply; pointer-events:none;}

  .page-inner{
    position:absolute; inset:0;
    padding:9% 11% 12%;
    color:var(--ink);
    display:flex; flex-direction:column;
  }

  /* ============ TYPOGRAPHY OF THE PAGE ============ */
  .running-head{
    font-family:'IM Fell English SC', serif;
    font-size:calc(var(--page-w) * .0165); letter-spacing:.32em; text-indent:.32em;
    text-align:center; color:var(--ink-faint);
    margin-bottom:1.6em;
  }
  .folio{
    position:absolute; bottom:5.5%;
    font-family:'Cormorant Garamond', serif;
    font-size:calc(var(--page-w) * .016); letter-spacing:.15em; color:var(--ink-faint);
  }
  .page.left .folio, .leaf-face.back .folio{ left:11%; }
  .page.right .folio, .leaf-face.front .folio{ right:11%; }

  .entry-no{
    font-family:'IM Fell English SC', serif;
    text-align:center; font-size:calc(var(--page-w) * .0175); letter-spacing:.4em; text-indent:.4em;
    color:var(--rubric); margin-bottom:.9em;
  }
  h2.entry-title{
    font-family:'IM Fell English SC', serif;
    font-weight:400; text-align:center;
    font-size:calc(var(--page-w) * .046);
    letter-spacing:.12em; line-height:1.25;
    margin-bottom:.4em;
  }
  .ornament{
    text-align:center; color:var(--brass);
    font-size:calc(var(--page-w) * .026); margin:.6em 0 1.1em;
    letter-spacing:.6em; text-indent:.6em;
  }

  .body-text{
    font-family:'IM Fell English', Georgia, serif;
    font-size:calc(var(--page-w) * .034);
    line-height:1.62;
    text-align:justify;
    hyphens:auto;
  }
  .body-text p + p{ text-indent:1.6em; margin-top:.15em; }

  .dropcap::first-letter{
    font-family:'IM Fell English SC', serif;
    float:left;
    font-size:3.4em; line-height:.82;
    padding:.06em .12em 0 0;
    color:var(--rubric);
  }

  .marginal{
    font-family:'Cormorant Garamond', serif;
    font-style:italic; font-size:calc(var(--page-w) * .0255);
    color:var(--ink-faint);
    border-left:1px solid rgba(122,47,29,.4);
    padding-left:.9em; margin:1.1em 0 1.1em .5em;
  }

  .xref{ font-variant:small-caps; letter-spacing:.06em; color:var(--rubric); font-style:normal; }

  /* title page */
  .title-page{ text-align:center; justify-content:center; }
  .title-page .tp-small{
    font-family:'IM Fell English SC', serif; font-size:calc(var(--page-w) * .0155);
    letter-spacing:.4em; text-indent:.4em; color:var(--ink-faint);
  }
  .title-page h1{
    font-family:'IM Fell English SC', serif; font-weight:400;
    font-size:calc(var(--page-w) * .07); letter-spacing:.14em;
    margin:.7em 0 .3em; line-height:1.2;
  }
  .title-page .tp-rule{ color:var(--brass); margin:1em 0; letter-spacing:.5em; text-indent:.5em; }
  .title-page .tp-edition{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    font-size:calc(var(--page-w) * .029); color:var(--ink-faint); line-height:1.7;
  }

  /* contents */
  .toc{ list-style:none; font-size:calc(var(--page-w) * .0305); }
  .toc li{
    display:flex; align-items:baseline; gap:.5em;
    margin-bottom:.85em; line-height:1.4;
  }
  .toc .t{ font-variant:small-caps; letter-spacing:.05em; }
  .toc .dots{ flex:1; border-bottom:1px dotted rgba(93,76,53,.6); transform:translateY(-3px); }
  .toc .n{ font-family:'Cormorant Garamond', serif; color:var(--ink-faint); }
  .toc .sealed-mark{ color:var(--rubric); font-size:.85em; }

  /* the animated sigil illustration */
  .plate{
    margin:1.2em auto .4em; width:62%;
    display:block;
  }
  .plate-caption{
    font-family:'Cormorant Garamond', serif; font-style:italic;
    text-align:center; font-size:calc(var(--page-w) * .0235); color:var(--ink-faint);
    margin-bottom:1em;
  }
  .sigil-rotate{ transform-origin:50% 50%; animation:sigilspin 60s linear infinite; }
  .sigil-rotate.rev{ animation-direction:reverse; animation-duration:90s; }
  .sigil-pulse{ animation:sigilpulse 5s ease-in-out infinite; transform-origin:50% 50%; }
  @keyframes sigilspin{ to{ transform:rotate(360deg);} }
  @keyframes sigilpulse{ 0%,100%{opacity:.55} 50%{opacity:1} }

  /* sealed / paywall page */
  .sealed{ justify-content:center; text-align:center; }
  .sealed .seal-glyph{ font-size:calc(var(--page-w) * .07); color:var(--rubric); margin-bottom:.5em;}
  .sealed h3{
    font-family:'IM Fell English SC', serif; font-weight:400;
    letter-spacing:.2em; font-size:calc(var(--page-w) * .032); margin-bottom:1em; color:var(--ink);
  }
  .sealed p{
    font-size:calc(var(--page-w) * .03); line-height:1.7; color:var(--ink-faint);
    max-width:26ch; margin:0 auto 1.6em; font-style:italic;
  }
  .sealed button{
    font-family:'IM Fell English SC', serif;
    letter-spacing:.25em; text-indent:.25em; font-size:calc(var(--page-w) * .024);
    background:none; color:var(--rubric);
    border:1px solid var(--rubric); border-radius:2px;
    padding:.9em 1.6em; cursor:pointer;
    transition:background .3s, color .3s;
  }
  .sealed button:hover, .sealed button:focus-visible{
    background:var(--rubric); color:var(--paper);
    outline:none;
  }

  /* blurred teaser text behind the seal */
  .veiled{
    filter:blur(4px); opacity:.5; user-select:none;
    margin-bottom:1.4em; font-size:calc(var(--page-w) * .03); text-align:justify;
  }

  /* ============ SPECIMEN COMPONENTS (appendix) ============ */
  /* numbered laws: rubricated roman numerals, hanging indent */
  .laws{ list-style:none; counter-reset:law; margin-top:.6em; font-size:calc(var(--page-w) * .0295); }
  .laws li{
    counter-increment:law;
    position:relative;
    padding-left:2.7em;
    margin-bottom:1em;
    line-height:1.5;
    text-align:left;
  }
  .laws li::before{
    content:counter(law, upper-roman) ".";
    position:absolute; left:0; top:.05em;
    font-family:'IM Fell English SC', serif;
    color:var(--rubric);
  }
  .laws .law-name{ font-variant:small-caps; letter-spacing:.04em; }

  /* pull quote with brass rules */
  .pullquote{
    margin:1.2em 0 .4em;
    text-align:center;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:calc(var(--page-w) * .05);
    line-height:1.35;
    color:var(--ink);
  }
  .pullquote .q-mark{
    display:block;
    font-size:1.8em; line-height:.5;
    color:var(--brass);
    font-style:normal;
  }
  .pullquote-attr{
    text-align:center;
    font-family:'IM Fell English SC', serif;
    font-size:calc(var(--page-w) * .0175);
    letter-spacing:.28em; text-indent:.28em;
    color:var(--ink-faint);
    margin:.9em 0 1.2em;
  }
  .rule-orn{ display:flex; align-items:center; gap:.8em; margin:1.1em 0; color:var(--brass);
    font-size:calc(var(--page-w) * .024); }
  .rule-orn::before,.rule-orn::after{ content:""; flex:1; border-top:1px solid rgba(156,124,60,.45); }

  /* table of correspondences */
  .grim-table{ width:100%; border-collapse:collapse; margin:1.1em 0 .5em;
    font-size:calc(var(--page-w) * .027); }
  .grim-table th{
    font-family:'IM Fell English SC', serif; font-weight:400;
    font-size:calc(var(--page-w) * .019); letter-spacing:.2em; text-indent:.2em;
    color:var(--rubric); padding:.5em .3em;
    border-bottom:1px solid rgba(122,47,29,.45);
  }
  .grim-table td{
    padding:.6em .3em; text-align:center;
    border-bottom:1px dotted rgba(93,76,53,.4);
  }
  .grim-table td:first-child{ font-variant:small-caps; letter-spacing:.03em; }
  .grim-table .glyph{ color:var(--rubric); font-size:1.1em; }

  /* two-column lexicon */
  .lexicon{ column-count:2; column-gap:2em; column-rule:1px solid rgba(156,124,60,.3);
    font-size:calc(var(--page-w) * .026); margin-top:.8em; }
  .lexicon dt{ font-variant:small-caps; letter-spacing:.05em; color:var(--rubric); break-after:avoid; }
  .lexicon dd{ font-family:'Cormorant Garamond', serif; font-style:italic;
    color:var(--ink-faint); margin:0 0 .95em; line-height:1.45; }

  /* ritual steps with tall numerals */
  .steps{ list-style:none; counter-reset:step; margin-top:.7em;
    font-size:calc(var(--page-w) * .0295); }
  .steps li{ counter-increment:step; display:flex; gap:.95em; margin-bottom:1.15em; line-height:1.55; }
  .steps li::before{
    content:counter(step);
    font-family:'Cormorant Garamond', serif;
    font-size:2em; line-height:.9;
    color:var(--brass);
    min-width:1em; text-align:center;
  }

  /* illuminated frame page */
  .frame-svg{ position:absolute; inset:4%; width:92%; height:92%; pointer-events:none; }

  /* ============ PLATE ANIMATIONS (CSS-driven) ============ */
  .orbit-slow{ animation:sigilspin 44s linear infinite; transform-origin:50% 50%; }
  .orbit-mid{ animation:sigilspin 23s linear infinite reverse; transform-origin:50% 50%; }
  .orbit-fast{ animation:sigilspin 11s linear infinite; transform-origin:50% 50%; }
  .twinkle{ animation:twinkle 3.4s ease-in-out infinite; }
  .twinkle.t2{ animation-duration:4.8s; animation-delay:1.2s; }
  .twinkle.t3{ animation-duration:6.1s; animation-delay:2.5s; }
  @keyframes twinkle{ 0%,100%{opacity:.2} 50%{opacity:1} }
  .inscribe{ stroke-dasharray:1; stroke-dashoffset:1; animation:inscribe 10s ease-in-out infinite; }
  .inscribe.d2{ animation-delay:1.3s; }
  .inscribe.d3{ animation-delay:2.6s; }
  .inscribe.d4{ animation-delay:3.9s; }
  .inscribe.d5{ animation-delay:5s; }
  @keyframes inscribe{
    0%{stroke-dashoffset:1; opacity:1}
    42%{stroke-dashoffset:0; opacity:1}
    80%{stroke-dashoffset:0; opacity:1}
    94%{stroke-dashoffset:0; opacity:0}
    100%{stroke-dashoffset:1; opacity:0}
  }
  .breathe{ animation:breathe 6s ease-in-out infinite; transform-origin:50% 50%; }
  @keyframes breathe{ 0%,100%{ transform:scale(.95); opacity:.7 } 50%{ transform:scale(1.05); opacity:1 } }
  .moon-shadow{ animation:moondrift 16s ease-in-out infinite alternate; }
  @keyframes moondrift{ from{ transform:translateX(-24px) } to{ transform:translateX(24px) } }

  /* ============ PAGE TURN ============ */
  .leaf{
    position:absolute;
    top:0; bottom:0;
    left:50%;
    width:var(--page-w);
    transform-style:preserve-3d;
    transform-origin:left center;
    pointer-events:none;
    z-index:5;
    display:none;
  }
  .leaf.turning{ display:block; animation:turnFwd var(--turn-ms) cubic-bezier(.45,.05,.3,1) forwards; }
  .leaf.turning.back{ animation:turnBack var(--turn-ms) cubic-bezier(.45,.05,.3,1) forwards; }
  @keyframes turnFwd{ from{transform:rotateY(0)} to{transform:rotateY(-180deg)} }
  @keyframes turnBack{ from{transform:rotateY(-180deg)} to{transform:rotateY(0)} }

  .leaf-face{
    position:absolute; inset:0;
    background:var(--paper);
    backface-visibility:hidden;
    overflow:hidden;
  }
  .leaf-face.front{ border-radius:0 4px 4px 0;
    box-shadow:inset 18px 0 28px -18px rgba(60,40,10,.55);}
  .leaf-face.back{ transform:rotateY(180deg); border-radius:4px 0 0 4px;
    box-shadow:inset -18px 0 28px -18px rgba(60,40,10,.55);}
  /* moving shadow cast on the book while the leaf turns */
  .turn-shade{
    position:absolute; inset:0; pointer-events:none; z-index:4;
    opacity:0; background:linear-gradient(90deg, transparent 45%, rgba(0,0,0,.28) 50%, transparent 60%);
  }
  .turn-shade.on{ animation:shade var(--turn-ms) ease-in-out forwards; }
  @keyframes shade{ 0%{opacity:0} 35%{opacity:1} 100%{opacity:0} }

  /* click zones */
  .zone{
    position:absolute; top:0; bottom:0; width:18%;
    cursor:pointer; z-index:6; background:none; border:none;
  }
  .zone:focus-visible{ outline:2px solid var(--brass); outline-offset:-4px; }
  .zone.prev{ left:0; } .zone.next{ right:0; }

  /* ============ JUMP TO PAGE ============ */
  .jump{
    position:absolute;
    right:calc(2vw + 8px); top:50%;
    transform:translateY(-50%);
    z-index:20;
    display:flex; align-items:baseline; gap:.55em;
    padding:.5em .9em;
    background:rgba(24,14,7,.85);
    border:1px solid rgba(156,124,60,.4);
    border-radius:3px;
    font-family:'IM Fell English SC', serif;
    font-size:.68rem; letter-spacing:.18em; text-indent:.18em;
    color:var(--brass);
  }
  .jump input{
    width:3em;
    background:none; border:none;
    border-bottom:1px solid rgba(156,124,60,.5);
    color:var(--paper);
    font-family:'Cormorant Garamond', serif;
    font-size:1rem; text-align:center;
    outline:none;
    -moz-appearance:textfield; appearance:textfield;
  }
  .jump input::-webkit-outer-spin-button,
  .jump input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .jump input:focus{ border-bottom-color:var(--brass); }
  .jump .total{
    color:#8a7452; font-family:'Cormorant Garamond', serif;
    font-size:.92rem; font-style:italic; letter-spacing:.05em; text-indent:0;

  .scroll-book{ display:none; }

  @media (orientation: portrait) and (max-width: 940px), (max-width: 720px){

    .scroll-book{
      display:block;

    }
    .page.m{
      position:relative;
      width:100%;
      height:calc(var(--page-w) * 1.36);
      background:var(--paper);
      border-radius:4px;

    .page.m > .page-inner{ position:absolute !important; inset:0; }
    .jump{

      top:auto; right:50%; transform:translateX(50%);
      bottom:calc(10px + env(safe-area-inset-bottom, 0px));
    }
  }

  @media (prefers-reduced-motion: reduce){
    .leaf{ display:none !important; }
    .turn-shade{ display:none !important; }
    .glow{ animation:none !important; }

  }
</style>

`<div class="page-inner" style="position:static">

/* ============ book engine ============ */
const pageL = document.getElementById('pageL');
const pageR = document.getElementById('pageR');
const leaf = document.getElementById('leaf');
const leafFront = document.getElementById('leafFront');
const leafBack = document.getElementById('leafBack');
const shade = document.getElementById('shade');
const stackL = document.getElementById('stackL');
const stackR = document.getElementById('stackR');

/* the tome's thickness: shifts subtly toward the left as you read.
   Fills sit in fixed-width slots, so the pages themselves never move. */
function updateStacks(frac){
  const max = isMobile() ? 15 : 30;
  const min = isMobile() ? 9  : 20;
  stackL.style.width = Math.round(min + frac * (max - min)) + 'px';
  stackR.style.width = Math.round(max - frac * (max - min)) + 'px';
}

let spread = 0; // spread n shows pages [2n, 2n+1]
let turning = false;
const maxSpread = Math.ceil(pages.length / 2) - 1;
const isMobile = () => window.matchMedia('(orientation: portrait) and (max-width: 940px), (max-width: 720px)').matches;
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function inner(html){ return html || '<div class="page-inner" style="position:static"></div>'; }

function render(){
  if (isMobile()) return; /* portrait mode is the pre-built scroll stack */
  fillSlot('pageL', pages[spread*2]);
  fillSlot('pageR', pages[spread*2+1]);
  updateStacks(maxSpread > 0 ? spread / maxSpread : 0);
  const ji = document.getElementById('jumpInput');
  if (document.activeElement !== ji) ji.value = spread*2 + 1;
}

/* build the scrollable page stack once; CSS decides when it's shown */
function buildScrollBook(){
  document.getElementById('scrollBook').innerHTML = pages.map(p =>
    `<div class="page m"><div class="parchment"></div>${p}</div>`
  ).join('');
}

/* pages are authored with their own .page-inner wrapper (which may carry
   layout classes like title-page or sealed); inject content AND classes */
function fillSlot(id, html){
  const el = document.getElementById(id);
  const tmp = document.createElement('div');
  tmp.innerHTML = html || '';
  const w = tmp.firstElementChild;
  el.className = w ? w.className : 'page-inner';
  el.innerHTML = w ? w.innerHTML : '';
}

function go(dir){
  if (turning || isMobile()) return;

  const next = spread + dir;
  if (next < 0 || next > maxSpread) return;

  if (reduced){
    spread = next; render(); return;
  }

  turning = true;

  if (dir > 0){
    /* leaf front = current right page, leaf back = next left page */
    fillSlot('leafFront', pages[spread*2+1]);
    fillSlot('leafBack', pages[next*2]);
    /* underneath: left stays, right becomes the next right page */
    fillSlot('pageR', pages[next*2+1]);
    leaf.classList.remove('back');
  } else {
    /* turning back: leaf starts flat on the left (rotated -180) and returns.
       front = previous right page, back = current left page */
    fillSlot('leafFront', pages[next*2+1]);
    fillSlot('leafBack', pages[spread*2]);
    fillSlot('pageL', pages[next*2]);
    leaf.classList.add('back');
  }

  leaf.classList.add('turning');
  shade.classList.add('on');

  setTimeout(()=>{
    leaf.classList.remove('turning','back');
    shade.classList.remove('on');
    spread = next;
    render();
    turning = false;
  }, 920);
}

document.getElementById('btnNext').addEventListener('click', ()=>go(1));
document.getElementById('btnPrev').addEventListener('click', ()=>go(-1));
document.addEventListener('keydown', e=>{
  if (e.target && e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});

/* jump to leaf */
const jumpInput = document.getElementById('jumpInput');
jumpInput.max = pages.length;
document.getElementById('jumpTotal').textContent = 'of ' + pages.length;

function jumpTo(){
  let p = parseInt(jumpInput.value, 10);
  if (isNaN(p)) return;
  p = Math.min(Math.max(p, 1), pages.length);
  jumpInput.value = p;
  jumpInput.blur();
  if (isMobile()){
    const el = document.querySelectorAll('#scrollBook .page.m')[p-1];
    if (el) el.scrollIntoView({behavior: reduced ? 'auto' : 'smooth', block:'start'});
  } else {
    spread = Math.floor((p-1)/2);
    render();
  }
}
document.getElementById('jumpGo').addEventListener('click', jumpTo);
jumpInput.addEventListener('keydown', e=>{ if (e.key === 'Enter') jumpTo(); });

window.addEventListener('resize', render);
buildScrollBook();
render();
</script>
</body>
</html>
