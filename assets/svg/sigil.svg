    </g>
    <g class="sigil-rotate rev" stroke="#9c7c3c">
      <polygon points="100,40 152,130 48,130" stroke-opacity=".75"/>
      <polygon points="100,160 48,70 152,70" stroke-opacity=".75"/>
    </g>
