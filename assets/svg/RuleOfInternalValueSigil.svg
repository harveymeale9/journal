<svg class="sigil-root" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="serif">
  <title>Rule 1 — The Rule of Internal Value</title>
  <desc>External circumstances influence emotion; emotion alone is where value exists, within the conscious self.</desc>

  <defs>
    <style>
      .sigil-root {
        --ink: #55211c;
        --gold: #b9903f;
        --cream1: #f8edd8;
        --cream2: #f0ddb8;
        --grey1: #2c2c2c;
        --grey2: #1a1a1a;
        --greyline: #9a9a9a;
        --lightfill: #eeeeee;
      }
      .ink   { stroke: var(--ink);  fill: none; }
      .gold  { stroke: var(--gold); fill: none; }
      .greyline { stroke: var(--greyline); fill: none; }
      .inkfill  { fill: var(--ink);  stroke: none; }
      .goldfill { fill: var(--gold); stroke: none; }
      .lightfill { fill: var(--lightfill); stroke: none; }
    </style>

    <!-- ============ outer wheel icons (now light grey/white line work) ============ -->
    <g id="i_dollar">
      <text x="0" y="8" text-anchor="middle" font-size="26" font-weight="bold" class="lightfill">$</text>
    </g>
    <g id="i_crown">
      <path d="M-9,5 L-9,-2 L-4.5,2.5 L0,-7 L4.5,2.5 L9,-2 L9,5 Z" class="greyline" stroke-width="1.4"/>
    </g>
    <g id="i_trophy">
      <path d="M-6,-8 L6,-8 L5,2 A5,5 0 0 1 -5,2 Z" class="greyline" stroke-width="1.3"/>
      <path d="M-6,-7 C-11,-7 -11,0 -6,1" class="greyline" stroke-width="1.1"/>
      <path d="M6,-7 C11,-7 11,0 6,1" class="greyline" stroke-width="1.1"/>
      <line x1="0" y1="7" x2="0" y2="11" class="greyline" stroke-width="1.3"/>
      <line x1="-5" y1="11" x2="5" y2="11" class="greyline" stroke-width="1.3"/>
    </g>
    <g id="i_people">
      <circle cx="-4.5" cy="-5" r="3.2" class="greyline" stroke-width="1.1"/>
      <circle cx="4.5" cy="-5" r="3.2" class="greyline" stroke-width="1.1"/>
      <path d="M-9,7 C-9,1 -1,1 -1,7" class="greyline" stroke-width="1.1"/>
      <path d="M1,7 C1,1 9,1 9,7" class="greyline" stroke-width="1.1"/>
    </g>
    <g id="i_house">
      <path d="M-9,10 L-9,-1 L0,-9 L9,-1 L9,10 Z" class="greyline" stroke-width="1.3"/>
      <line x1="-3" y1="10" x2="-3" y2="3" class="greyline" stroke-width="1"/>
      <line x1="3" y1="10" x2="3" y2="3" class="greyline" stroke-width="1"/>
    </g>
    <g id="i_car">
      <path d="M-10,3 L-8,-3 L8,-3 L10,3 L10,7 L-10,7 Z" class="greyline" stroke-width="1.3"/>
      <circle cx="-5.5" cy="7" r="2.3" class="greyline" stroke-width="1"/>
      <circle cx="5.5" cy="7" r="2.3" class="greyline" stroke-width="1"/>
    </g>
    <g id="i_briefcase">
      <path d="M-4,-6 L4,-6 L4,-9 L-4,-9 Z" class="greyline" stroke-width="1"/>
      <rect x="-10" y="-6" width="20" height="15" rx="1.5" class="greyline" stroke-width="1.3"/>
      <line x1="-10" y1="0" x2="10" y2="0" class="greyline" stroke-width="1"/>
    </g>
    <g id="i_diamond">
      <polygon points="0,-9 7,-2 0,9 -7,-2" class="greyline" stroke-width="1.2"/>
      <line x1="-7" y1="-2" x2="7" y2="-2" class="greyline" stroke-width="0.7"/>
    </g>
    <g id="i_mountain">
      <path d="M-11,8 L-3,-8 L3,0 L6,-4 L11,8 Z" class="greyline" stroke-width="1.2"/>
    </g>
    <g id="i_dress">
      <path d="M-3,-9 L3,-9 L4,-3 L9,10 L-9,10 L-4,-3 Z" class="greyline" stroke-width="1.2"/>
    </g>
    <g id="i_medal">
      <path d="M-6,-9 L-2,0 L-8,4" class="greyline" stroke-width="1"/>
      <path d="M6,-9 L2,0 L8,4" class="greyline" stroke-width="1"/>
      <circle cy="4" r="6" class="greyline" stroke-width="1.3"/>
    </g>
    <g id="i_star">
      <polygon points="0,-9 2.1,-2.7 9,0 2.1,2.7 0,9 -2.1,2.7 -9,0 -2.1,-2.7" class="greyline" stroke-width="1"/>
    </g>

    <!-- ============ inner ring: two alternating heart glyphs (now gold, cream scheme) ============ -->
    <g id="heart1">
      <g transform="scale(0.72) translate(-16,-15)">
        <path class="goldfill" d="M24 12.977c-3.866 0-7 3.158-7 7.055 0 2.22 1.020 4.197 2.609 5.491-2.056 1.525-3.609 2.488-3.609 2.488s-14-8.652-14-15.622c0-4.2 2.583-8.399 7.5-8.399 4.5 0 6.5 4.296 6.5 4.296s1.75-4.296 6.5-4.296 7.416 4.115 7.416 8.399c0 0.958-0.272 1.943-0.716 2.932-1.281-1.436-3.134-2.344-5.2-2.344zM24 13.984c3.313 0 6 2.707 6 6.047s-2.687 6.048-6 6.048c-3.314 0-6-2.708-6-6.048s2.686-6.047 6-6.047zM21 21.039h2v2.016h2v-2.016h2v-2.016h-2v-2.016h-2v2.016h-2v2.016z"/>
      </g>
    </g>
    <g id="heart2">
      <g transform="scale(0.72) translate(-16,-15)">
        <path class="goldfill" d="M24 12.977c-3.866 0-7 3.158-7 7.055 0 2.22 1.020 4.197 2.609 5.491-2.056 1.525-3.609 2.488-3.609 2.488s-14-8.652-14-15.622c0-4.2 2.583-8.399 7.5-8.399 4.5 0 6.5 4.296 6.5 4.296s1.75-4.296 6.5-4.296 7.416 4.115 7.416 8.399c0 0.958-0.272 1.943-0.716 2.932-1.281-1.436-3.134-2.344-5.2-2.344zM24 13.984c3.313 0 6 2.707 6 6.047s-2.687 6.048-6 6.048c-3.314 0-6-2.708-6-6.048s2.686-6.047 6-6.047zM21 21.039h6v-2.016h-6v2.016z"/>
      </g>
    </g>
  </defs>

  <g transform="translate(400,400)">

    <!-- ================= outer wheel: twelve wedges, black/grey — the external world ================= -->
    <g id="world_wheel">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/>
      <path d="M-50.47,-188.35 A195,195 0 0,1 50.47,-188.35 L37.53,-140.06 A145,145 0 0,0 -37.53,-140.06 Z" fill="var(--grey1)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M50.47,-188.35 A195,195 0 0,1 137.89,-137.89 L102.53,-102.53 A145,145 0 0,0 37.53,-140.06 Z" fill="var(--grey2)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M137.89,-137.89 A195,195 0 0,1 188.35,-50.47 L140.06,-37.53 A145,145 0 0,0 102.53,-102.53 Z" fill="var(--grey1)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M188.35,-50.47 A195,195 0 0,1 188.35,50.47 L140.06,37.53 A145,145 0 0,0 140.06,-37.53 Z" fill="var(--grey2)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M188.35,50.47 A195,195 0 0,1 137.89,137.89 L102.53,102.53 A145,145 0 0,0 140.06,37.53 Z" fill="var(--grey1)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M137.89,137.89 A195,195 0 0,1 50.47,188.35 L37.53,140.06 A145,145 0 0,0 102.53,102.53 Z" fill="var(--grey2)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M50.47,188.35 A195,195 0 0,1 -50.47,188.35 L-37.53,140.06 A145,145 0 0,0 37.53,140.06 Z" fill="var(--grey1)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M-50.47,188.35 A195,195 0 0,1 -137.89,137.89 L-102.53,102.53 A145,145 0 0,0 -37.53,140.06 Z" fill="var(--grey2)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M-137.89,137.89 A195,195 0 0,1 -188.35,50.47 L-140.06,37.53 A145,145 0 0,0 -102.53,102.53 Z" fill="var(--grey1)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M-188.35,50.47 A195,195 0 0,1 -188.35,-50.47 L-140.06,-37.53 A145,145 0 0,0 -140.06,37.53 Z" fill="var(--grey2)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M-188.35,-50.47 A195,195 0 0,1 -137.89,-137.89 L-102.53,-102.53 A145,145 0 0,0 -140.06,-37.53 Z" fill="var(--grey1)" stroke="var(--greyline)" stroke-width="1.5"/>
      <path d="M-137.89,-137.89 A195,195 0 0,1 -50.47,-188.35 L-37.53,-140.06 A145,145 0 0,0 -102.53,-102.53 Z" fill="var(--grey2)" stroke="var(--greyline)" stroke-width="1.5"/>

      <circle r="195" class="greyline" stroke-width="3" fill="none"/>
      <circle r="145" class="greyline" stroke-width="3" fill="none"/>

      <!-- each icon counter-rotates so it stays upright as the wheel turns -->
      <g transform="translate(0,-170)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_dollar"/></g></g>
      <g transform="translate(85,-147.22)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_crown"/></g></g>
      <g transform="translate(147.22,-85)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_trophy"/></g></g>
      <g transform="translate(170,0)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_people"/></g></g>
      <g transform="translate(147.22,85)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_house"/></g></g>
      <g transform="translate(85,147.22)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_car"/></g></g>
      <g transform="translate(0,170)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_briefcase"/></g></g>
      <g transform="translate(-85,147.22)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_diamond"/></g></g>
      <g transform="translate(-147.22,85)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_mountain"/></g></g>
      <g transform="translate(-170,0)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_dress"/></g></g>
      <g transform="translate(-147.22,-85)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_medal"/></g></g>
      <g transform="translate(-85,-147.22)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/><use xlink:href="#i_star"/></g></g>
    </g>

    <!-- ================= inner field: cream/gold, same scheme the outer ring used to wear ================= -->
    <circle r="145" fill="var(--cream1)"/>

    <g id="emotion_ring">
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite"/>
      <circle r="112" class="gold" stroke-width="1.5" fill="var(--cream2)"/>
      <circle r="88" class="gold" stroke-width="1.5" fill="none"/>

      <g class="gold" stroke-width="0.8" stroke-dasharray="2,4" opacity="0.75">
        <line x1="0" y1="-100" x2="58.78" y2="-80.90"/>
        <line x1="58.78" y1="-80.90" x2="95.11" y2="-30.90"/>
        <line x1="95.11" y1="-30.90" x2="95.11" y2="30.90"/>
        <line x1="95.11" y1="30.90" x2="58.78" y2="80.90"/>
        <line x1="58.78" y1="80.90" x2="0" y2="100"/>
        <line x1="0" y1="100" x2="-58.78" y2="80.90"/>
        <line x1="-58.78" y1="80.90" x2="-95.11" y2="30.90"/>
        <line x1="-95.11" y1="30.90" x2="-95.11" y2="-30.90"/>
        <line x1="-95.11" y1="-30.90" x2="-58.78" y2="-80.90"/>
        <line x1="-58.78" y1="-80.90" x2="0" y2="-100"/>
        <line x1="0" y1="-100" x2="0" y2="-66"/>
        <line x1="58.78" y1="-80.90" x2="38" y2="-52"/>
        <line x1="95.11" y1="-30.90" x2="63" y2="-20"/>
        <line x1="95.11" y1="30.90" x2="63" y2="20"/>
        <line x1="58.78" y1="80.90" x2="38" y2="52"/>
        <line x1="0" y1="100" x2="0" y2="66"/>
        <line x1="-58.78" y1="80.90" x2="-38" y2="52"/>
        <line x1="-95.11" y1="30.90" x2="-63" y2="20"/>
        <line x1="-95.11" y1="-30.90" x2="-63" y2="-20"/>
        <line x1="-58.78" y1="-80.90" x2="-38" y2="-52"/>
      </g>

      <!-- alternating heart glyphs, each held upright against the ring's counter-rotation -->
      <g transform="translate(0,-100)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart1"/></g></g>
      <g transform="translate(58.78,-80.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart2"/></g></g>
      <g transform="translate(95.11,-30.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart1"/></g></g>
      <g transform="translate(95.11,30.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart2"/></g></g>
      <g transform="translate(58.78,80.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart1"/></g></g>
      <g transform="translate(0,100)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart2"/></g></g>
      <g transform="translate(-58.78,80.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart1"/></g></g>
      <g transform="translate(-95.11,30.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart2"/></g></g>
      <g transform="translate(-95.11,-30.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart1"/></g></g>
      <g transform="translate(-58.78,-80.90)"><g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="18s" repeatCount="indefinite"/><use xlink:href="#heart2"/></g></g>
    </g>

    <!-- ================= energy: outer circumstance reaching for the inner realm ================= -->
    <g class="ink" stroke-width="1.1" stroke-dasharray="1,4" stroke-linecap="round" opacity="0.65">
      <line x1="0" y1="-145" x2="0" y2="-112"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="72.5" y1="-125.58" x2="56" y2="-96.99"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="125.58" y1="-72.5" x2="96.99" y2="-56"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="145" y1="0" x2="112" y2="0"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="125.58" y1="72.5" x2="96.99" y2="56"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="72.5" y1="125.58" x2="56" y2="96.99"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="0" y1="145" x2="0" y2="112"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="-72.5" y1="125.58" x2="-56" y2="96.99"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="-125.58" y1="72.5" x2="-96.99" y2="56"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="-145" y1="0" x2="-112" y2="0"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="-125.58" y1="-72.5" x2="-96.99" y2="-56"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
      <line x1="-72.5" y1="-125.58" x2="-56" y2="-96.99"><animate attributeName="stroke-dashoffset" values="0;-20" dur="1.6s" repeatCount="indefinite"/></line>
    </g>

    <!-- ================= the core: conscious self — flashes between red-on-white and white-on-black ================= -->
    <g id="core_group">
      <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="2.6s" repeatCount="indefinite"/>

      <circle r="62" stroke="#111111" stroke-width="3">
        <animate attributeName="fill" values="#fffdf8;#111111;#fffdf8" keyTimes="0;0.5;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
      </circle>

      <g transform="scale(1.05) translate(-31.9,-31.9)" fill="#55211c">
        <animate attributeName="fill" values="#55211c;#ffffff;#55211c" keyTimes="0;0.5;1" calcMode="discrete" dur="6s" repeatCount="indefinite"/>
        <circle cx="31.686" cy="9.089" r="9.089"/>
        <path d="M58.496,48.961c-4.383-10.289-19.918-26.166-20.22-26.362c-1.563-1.687-3.848-2.515-6.156-2.549
          v-0.007c-0.001,0-0.434,0-0.435,0v0.007c-2.308,0.035-4.594,0.863-6.156,2.549C25.227,22.795,9.691,38.672,5.308,48.961
          c-1.071,2.516-0.068,4.885,1.611,6.282c-0.416,1.38-0.426,2.921,0.041,4.408c0.803,2.562,2.881,4.154,5.418,4.154
          c4.854,0,34.166,0,39.047,0c2.537,0,4.614-1.593,5.417-4.154c0.468-1.487,0.458-3.028,0.041-4.408
          C58.565,53.846,59.568,51.477,58.496,48.961z M17.23,47.34c1.864-3.046,3.989-5.831,6.299-8.511c0,2.764,0.08,9.679,0.219,10.307
          C23.279,49.015,18.925,47.918,17.23,47.34z M40.058,49.136c0.138-0.628,0.218-7.543,0.218-10.307
          c2.312,2.68,4.437,5.465,6.3,8.511C44.882,47.918,40.528,49.015,40.058,49.136z"/>
      </g>
    </g>
  </g>
</svg>
