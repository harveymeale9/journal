<svg class="sigil-root" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="serif">
  <title>Rule 2 — The Rule of Meaning</title>
  <desc>Six circumstances travel a single infinity loop inside a quiet outer ring. Each crosses the same pivot and comes out the other side glowing as a particular feeling — always the same one, every lap — then crosses back and becomes a circumstance again.</desc>

  <defs>
    <style>
      .sigil-root {
        --ink: #55211c;
        --border-dark: #1a1a1a;
        --grey1: #2c2c2c;
        --grey2: #1a1a1a;
        --greyline: #9a9a9a;
        --lightfill: #eeeeee;
        --cream: #f8edd8;
        --h1: #7a3630;
        --h2: #b9903f;
        --h3: #3f6f6a;
        --h4: #5c4a73;
        --h5: #b06a2e;
        --h6: #545a68;
        --h7: #8a3324;
      }
      .greyline { stroke: var(--greyline); fill: none; }
    </style>

    <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ============ circumstances: plain, unfilled, objective ============ -->
    <g id="c_briefcase">
      <path d="M-4,-6 L4,-6 L4,-9 L-4,-9 Z" class="greyline" stroke-width="1.1"/>
      <rect x="-10" y="-6" width="20" height="15" rx="1.5" class="greyline" stroke-width="1.3"/>
      <line x1="-10" y1="0" x2="10" y2="0" class="greyline" stroke-width="1"/>
    </g>
    <g id="c_ring">
      <circle cx="-3" cy="0" r="6" class="greyline" stroke-width="1.2"/>
      <circle cx="3" cy="0" r="6" class="greyline" stroke-width="1.2"/>
    </g>
    <g id="c_female">
      <circle cy="-3" r="6" class="greyline" stroke-width="1.3"/>
      <line x1="0" y1="3" x2="0" y2="11" class="greyline" stroke-width="1.3"/>
      <line x1="-4" y1="7" x2="4" y2="7" class="greyline" stroke-width="1.3"/>
    </g>
    <g id="c_house">
      <path d="M-9,10 L-9,-1 L0,-9 L9,-1 L9,10 Z" class="greyline" stroke-width="1.3"/>
      <line x1="-3" y1="10" x2="-3" y2="3" class="greyline" stroke-width="1"/>
      <line x1="3" y1="10" x2="3" y2="3" class="greyline" stroke-width="1"/>
    </g>
    <g id="c_diamond">
      <polygon points="0,-9 7,-2 0,9 -7,-2" class="greyline" stroke-width="1.2"/>
      <line x1="-7" y1="-2" x2="7" y2="-2" class="greyline" stroke-width="0.7"/>
    </g>
    <g id="c_star">
      <polygon points="0,-9 2.1,-2.7 9,0 2.1,2.7 0,9 -2.1,2.7 -9,0 -2.1,-2.7" class="greyline" stroke-width="1.1"/>
    </g>

    <!-- ============ emotions: recolored face glyphs, glowing in orbs ============ -->
    <g id="orb_angry">
      <circle r="11" fill="var(--h7)" filter="url(#glow)"/>
      <circle r="11" fill="var(--h7)"/>
      <path fill="var(--cream)" fill-rule="evenodd" clip-rule="evenodd" transform="scale(1.05) translate(-8,-8)"
        d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM5 4H4V5.5C4 6.32843 4.67157 7 5.5 7C6.32843 7 7 6.32843 7 5.5L5 4ZM12 4H11L9 5.5C9 6.32843 9.67157 7 10.5 7C11.3284 7 12 6.32843 12 5.5V4ZM8 10C6.89543 10 6 10.8954 6 12H4C4 9.79086 5.79086 8 8 8C10.2091 8 12 9.79086 12 12H10C10 10.8954 9.10457 10 8 10Z"/>
    </g>
    <g id="orb_laugh">
      <circle r="11" fill="var(--h5)" filter="url(#glow)"/>
      <circle r="11" fill="var(--h5)"/>
      <path fill="var(--cream)" fill-rule="evenodd" clip-rule="evenodd" transform="scale(1.05) translate(-8,-8)"
        d="M16 8C16 12.4183 12.4183 16 8 16C3.58172 16 0 12.4183 0 8C0 3.58172 3.58172 0 8 0C12.4183 0 16 3.58172 16 8ZM7 5.5C7 6.32843 6.32843 7 5.5 7C4.67157 7 4 6.32843 4 5.5C4 4.67157 4.67157 4 5.5 4C6.32843 4 7 4.67157 7 5.5ZM10.5 7C11.3284 7 12 6.32843 12 5.5C12 4.67157 11.3284 4 10.5 4C9.67157 4 9 4.67157 9 5.5C9 6.32843 9.67157 7 10.5 7ZM4 9C4 11.2091 5.79086 13 8 13C10.2091 13 12 11.2091 12 9H4Z"/>
    </g>
    <g id="orb_openmouth">
      <circle r="11" fill="var(--h4)" filter="url(#glow)"/>
      <circle r="11" fill="var(--h4)"/>
      <path fill="var(--cream)" fill-rule="evenodd" clip-rule="evenodd" transform="scale(1.05) translate(-8,-8)"
        d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM5.5 7C6.32843 7 7 6.32843 7 5.5C7 4.67157 6.32843 4 5.5 4C4.67157 4 4 4.67157 4 5.5C4 6.32843 4.67157 7 5.5 7ZM12 5.5C12 6.32843 11.3284 7 10.5 7C9.67157 7 9 6.32843 9 5.5C9 4.67157 9.67157 4 10.5 4C11.3284 4 12 4.67157 12 5.5ZM8 12C8.82843 12 9.5 11.3284 9.5 10.5C9.5 9.67157 8.82843 9 8 9C7.17157 9 6.5 9.67157 6.5 10.5C6.5 11.3284 7.17157 12 8 12Z"/>
    </g>
    <g id="orb_meh">
      <circle r="11" fill="var(--h3)" filter="url(#glow)"/>
      <circle r="11" fill="var(--h3)"/>
      <path fill="var(--cream)" fill-rule="evenodd" clip-rule="evenodd" transform="scale(1.05) translate(-8,-8)"
        d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM5.5 7C6.32843 7 7 6.32843 7 5.5C7 4.67157 6.32843 4 5.5 4C4.67157 4 4 4.67157 4 5.5C4 6.32843 4.67157 7 5.5 7ZM12 5.5C12 6.32843 11.3284 7 10.5 7C9.67157 7 9 6.32843 9 5.5C9 4.67157 9.67157 4 10.5 4C11.3284 4 12 4.67157 12 5.5ZM4 9V11H12V9H4Z"/>
    </g>
    <g id="orb_smile">
      <circle r="11" fill="var(--h2)" filter="url(#glow)"/>
      <circle r="11" fill="var(--h2)"/>
      <path fill="var(--cream)" fill-rule="evenodd" clip-rule="evenodd" transform="scale(1.05) translate(-8,-8)"
        d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM5.5 7C6.32843 7 7 6.32843 7 5.5C7 4.67157 6.32843 4 5.5 4C4.67157 4 4 4.67157 4 5.5C4 6.32843 4.67157 7 5.5 7ZM12 5.5C12 6.32843 11.3284 7 10.5 7C9.67157 7 9 6.32843 9 5.5C9 4.67157 9.67157 4 10.5 4C11.3284 4 12 4.67157 12 5.5ZM8 11C6.89543 11 6 10.1046 6 9H4C4 11.2091 5.79086 13 8 13C10.2091 13 12 11.2091 12 9H10C10 10.1046 9.10457 11 8 11Z"/>
    </g>
    <g id="orb_cry">
      <circle r="11" fill="var(--h1)" filter="url(#glow)"/>
      <circle r="11" fill="var(--h1)"/>
      <path fill="var(--cream)" fill-rule="evenodd" clip-rule="evenodd" transform="scale(1.05) translate(-8,-8)"
        d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM8 9C9.65685 9 11 10.3431 11 12H5C5 10.3431 6.34315 9 8 9ZM7 4H6L4 5.5C4 6.32843 4.67157 7 5.5 7C6.32843 7 7 6.32843 7 5.5V4ZM10 4H9V5.5C9 6.32843 9.67157 7 10.5 7C11.3284 7 12 6.32843 12 5.5L10 4Z"/>
    </g>

    <!-- pivot: fixed black triangle at the crossing -->
    <g id="pivot_mark">
      <polygon points="0,-12 10.4,6 -10.4,6" fill="#000000"/>
    </g>

    <!-- alternating rungs: plain triangle, then faceted crystal -->
    <g id="i_tri">
      <polygon points="0,-9 7.8,4.5 -7.8,4.5" class="greyline" stroke-width="1" fill="var(--lightfill)"/>
    </g>
    <g id="i_crystal">
      <polygon points="0,-9 7.8,4.5 -7.8,4.5" class="greyline" stroke-width="1" fill="var(--lightfill)"/>
      <line x1="0" y1="-9" x2="0" y2="4.5" class="greyline" stroke-width="0.6"/>
      <line x1="-4.2" y1="-2" x2="4.2" y2="-2" class="greyline" stroke-width="0.5"/>
    </g>

    <!-- track centerline — used both as the visible stroke and the motion guide -->
    <path id="infinity_path" d="M0,0 A59,28.5 0 1,1 118,0 A59,28.5 0 1,1 0,0 A59,28.5 0 1,0 -118,0 A59,28.5 0 1,0 0,0" fill="none"/>
  </defs>

  <g transform="translate(400,400)">

    <!-- ================= outer ring: black/grey, matching the Rule 1 sigil's frame ================= -->
    <g id="outer_ring">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="46s" repeatCount="indefinite"/>
      <path fill="var(--grey1)" fill-rule="evenodd" d="M0,-195 A195,195 0 1,0 0,195 A195,195 0 1,0 0,-195 Z M0,-150 A150,150 0 1,0 0,150 A150,150 0 1,0 0,-150 Z"/>
      <circle r="195" class="greyline" stroke-width="2"/>
      <circle r="150" class="greyline" stroke-width="1.6"/>
      <g class="greyline" stroke-width="0.8" opacity="0.6">
        <line x1="0" y1="-150" x2="0" y2="-195"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(30)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(60)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(90)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(120)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(150)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(180)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(210)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(240)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(270)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(300)"/>
        <line x1="0" y1="-150" x2="0" y2="-195" transform="rotate(330)"/>
      </g>

      <g transform="translate(44.5,-166.1)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_tri"/></g></g>
      <g transform="translate(121.6,-121.6)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_crystal"/></g></g>
      <g transform="translate(166.1,-44.5)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_tri"/></g></g>
      <g transform="translate(166.1,44.5)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_crystal"/></g></g>
      <g transform="translate(121.6,121.6)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_tri"/></g></g>
      <g transform="translate(44.5,166.1)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_crystal"/></g></g>
      <g transform="translate(-44.5,166.1)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_tri"/></g></g>
      <g transform="translate(-121.6,121.6)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_crystal"/></g></g>
      <g transform="translate(-166.1,44.5)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_tri"/></g></g>
      <g transform="translate(-166.1,-44.5)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_crystal"/></g></g>
      <g transform="translate(-121.6,-121.6)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_tri"/></g></g>
      <g transform="translate(-44.5,-166.1)"><g><animateTransform attributeName="transform" type="rotate" values="0;-360" dur="46s" repeatCount="indefinite"/><use xlink:href="#i_crystal"/></g></g>
    </g>

    <!-- ================= inner cream field ================= -->
    <circle r="150" fill="var(--cream)"/>

    <!-- ================= the entire infinity assembly: track, pivot, and riders, spinning together counter-clockwise ================= -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="60s" repeatCount="indefinite"/>

      <use xlink:href="#infinity_path" stroke="var(--border-dark)" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
      <use xlink:href="#infinity_path" stroke="var(--ink)" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>

      <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" repeatCount="indefinite"/><use xlink:href="#pivot_mark"/></g>

      <!-- briefcase -> angry -->
      <g opacity="0">
        <animateMotion dur="16s" begin="0s" keyPoints="0;0.5;1" keyTimes="0;0.375;1" calcMode="linear" repeatCount="indefinite"><mpath xlink:href="#infinity_path"/></animateMotion>
        <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.01s" fill="freeze"/>
        <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" begin="0s" repeatCount="indefinite"/>
          <g><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="0s" repeatCount="indefinite"/><use xlink:href="#orb_angry"/></g>
          <g><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="0s" repeatCount="indefinite"/><use xlink:href="#c_briefcase"/></g>
        </g>
      </g>

      <!-- ring -> laugh -->
      <g opacity="0">
        <animateMotion dur="16s" begin="2.6667s" keyPoints="0;0.5;1" keyTimes="0;0.375;1" calcMode="linear" repeatCount="indefinite"><mpath xlink:href="#infinity_path"/></animateMotion>
        <animate attributeName="opacity" from="0" to="1" begin="2.6667s" dur="0.01s" fill="freeze"/>
        <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" begin="0s" repeatCount="indefinite"/>
          <g><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="2.6667s" repeatCount="indefinite"/><use xlink:href="#orb_laugh"/></g>
          <g><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="2.6667s" repeatCount="indefinite"/><use xlink:href="#c_ring"/></g>
        </g>
      </g>

      <!-- female symbol (new baby) -> open-mouth -->
      <g opacity="0">
        <animateMotion dur="16s" begin="5.3333s" keyPoints="0;0.5;1" keyTimes="0;0.375;1" calcMode="linear" repeatCount="indefinite"><mpath xlink:href="#infinity_path"/></animateMotion>
        <animate attributeName="opacity" from="0" to="1" begin="5.3333s" dur="0.01s" fill="freeze"/>
        <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" begin="0s" repeatCount="indefinite"/>
          <g><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="5.3333s" repeatCount="indefinite"/><use xlink:href="#orb_openmouth"/></g>
          <g><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="5.3333s" repeatCount="indefinite"/><use xlink:href="#c_female"/></g>
        </g>
      </g>

      <!-- house -> meh/calm -->
      <g opacity="0">
        <animateMotion dur="16s" begin="8s" keyPoints="0;0.5;1" keyTimes="0;0.375;1" calcMode="linear" repeatCount="indefinite"><mpath xlink:href="#infinity_path"/></animateMotion>
        <animate attributeName="opacity" from="0" to="1" begin="8s" dur="0.01s" fill="freeze"/>
        <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" begin="0s" repeatCount="indefinite"/>
          <g><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="8s" repeatCount="indefinite"/><use xlink:href="#orb_meh"/></g>
          <g><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="8s" repeatCount="indefinite"/><use xlink:href="#c_house"/></g>
        </g>
      </g>

      <!-- diamond -> smile/pride -->
      <g opacity="0">
        <animateMotion dur="16s" begin="10.6667s" keyPoints="0;0.5;1" keyTimes="0;0.375;1" calcMode="linear" repeatCount="indefinite"><mpath xlink:href="#infinity_path"/></animateMotion>
        <animate attributeName="opacity" from="0" to="1" begin="10.6667s" dur="0.01s" fill="freeze"/>
        <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" begin="0s" repeatCount="indefinite"/>
          <g><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="10.6667s" repeatCount="indefinite"/><use xlink:href="#orb_smile"/></g>
          <g><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="10.6667s" repeatCount="indefinite"/><use xlink:href="#c_diamond"/></g>
        </g>
      </g>

      <!-- star (a dream) -> cry -->
      <g opacity="0">
        <animateMotion dur="16s" begin="13.3333s" keyPoints="0;0.5;1" keyTimes="0;0.375;1" calcMode="linear" repeatCount="indefinite"><mpath xlink:href="#infinity_path"/></animateMotion>
        <animate attributeName="opacity" from="0" to="1" begin="13.3333s" dur="0.01s" fill="freeze"/>
        <g><animateTransform attributeName="transform" type="rotate" values="0;360" dur="60s" begin="0s" repeatCount="indefinite"/>
          <g><animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="13.3333s" repeatCount="indefinite"/><use xlink:href="#orb_cry"/></g>
          <g><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.374;0.375;1" calcMode="discrete" dur="16s" begin="13.3333s" repeatCount="indefinite"/><use xlink:href="#c_star"/></g>
        </g>
      </g>
    </g>
  </g>
</svg>
