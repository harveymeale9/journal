<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Reality Manual — Digital Grimoire</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Caveat:wght@500;600&display=swap" rel="stylesheet">

<!-- Order matters: tokens first (everything reads from them),
     responsive last (it overrides). Everything between is independent.

     CACHING IS FULLY OFF while we're actively iterating — every CSS file
     and every JS module (including their OWN internal imports of each
     other, see js/main.js and friends) is fetched with a query string
     tied to THIS page load's timestamp (window.__BUST, set below), never
     a hand-typed number. That number was supposed to be bumped by hand on
     every change and reliably wasn't, so pages kept silently rendering
     stale CSS/JS. document.write here (not a normal <link> list) is what
     lets the query string be computed at load time rather than baked into
     the HTML source.

     TO TURN CACHING BACK ON when we're done iterating: replace this
     document.write block with plain <link rel="stylesheet" href="css/X.css">
     tags (no query string) for each file below, and revert js/main.js's
     dynamic-import bootstrap (and every other js/*.js file's own internal
     imports) back to plain static `import … from './x.js'` lines. -->
<script>
  window.__BUST = Date.now();
  document.write(
    ['tokens','base','book','typography','components','animations','page-turn','ui','pages','responsive']
      .map(function(f){ return '<link rel="stylesheet" href="css/' + f + '.css?v=' + window.__BUST + '">'; })
      .join('')
  );
</script>
</head>
<body>
<div class="glow"></div>

<div class="loading-indicator" id="loadingIndicator" aria-hidden="true">
  <span>Reality Loading</span><span class="loading-dots"><span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></span>
</div>

<header class="site">
  <h1>The Reality Manual</h1>
  <button class="fs-toggle" id="fsToggle" type="button" aria-pressed="false">Fullscreen</button>
</header>

<div class="stage">
<div class="candle" aria-hidden="true">
  <div class="candle-body">
    <img class="candle-stick" src="assets/images/candlestick.webp" alt="">
    <div class="flame-halo"></div>
    <div class="flame">
      <div class="flame-body"></div>
      <div class="flame-core"></div>
    </div>
  </div>
</div>
<button class="side-zone" id="sideLeft" aria-label="Previous page" tabindex="-1"></button>
<div class="book-wrap">
  <div class="book" id="book">
    <div class="stack left" aria-hidden="true"><div class="fill" id="stackL"></div></div>
    <div class="pages-wrap">
    <div class="page left"><div class="parchment"></div><svg class="grain" width="100%" height="100%"><filter id="g1"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.36  0 0 0 0 0.22  0 0 0 0.06 0"/></filter><rect width="100%" height="100%" filter="url(#g1)"/></svg><div class="page-inner" id="pageL"></div><div class="candle-cast" aria-hidden="true"></div></div>
    <div class="page right"><div class="parchment"></div><svg class="grain" width="100%" height="100%"><filter id="g2"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="n"/><feColorMatrix in="n" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.36  0 0 0 0 0.22  0 0 0 0.06 0"/></filter><rect width="100%" height="100%" filter="url(#g2)"/></svg><div class="page-inner" id="pageR"></div>
    </div>
    </div>

    <div class="spine" aria-hidden="true"></div>
    <div class="leaf" id="leaf">
      <div class="leaf-face front"><div class="parchment"></div><div class="page-inner" id="leafFront"></div></div>
      <div class="leaf-face back"><div class="parchment"></div><div class="page-inner" id="leafBack"></div></div>
    </div>
    <div class="turn-shade" id="shade"></div>
    <div class="stack right" aria-hidden="true"><div class="fill" id="stackR"></div></div>

    <button class="zone prev" id="btnPrev" aria-label="Previous page"></button>
    <button class="zone next" id="btnNext" aria-label="Next page"></button>
  </div>
</div>
<button class="side-zone" id="sideRight" aria-label="Next page" tabindex="-1"></button>
</div>

<div class="scroll-book" id="scrollBook"></div>

<!-- A direct child of body, deliberately not nested inside .book-wrap:
     .book-wrap sets `perspective`, and perspective (like transform) on an
     ancestor makes THAT ancestor the containing block for any
     position:fixed descendant instead of the real viewport — so a .jump
     nested inside it would compute its "fixed" coordinates relative to
     the book's own box, landing wherever the book happens to sit rather
     than where jump.js actually asked for. Living out here, its
     positioning is against the true viewport, which is what jump.js
     assumes when it reads a folio's getBoundingClientRect() (always
     viewport-relative) and writes it straight to style.left/top. -->
<div class="jump" role="group" aria-label="Jump to a page of the book">
  <span class="jump-badge"><input id="jumpInput" type="text" readonly inputmode="none" aria-label="Page number"></span>
  <span class="total" id="jumpTotal"></span>
  <div class="numpad" id="numpad" aria-label="Number pad">
    <button type="button" data-k="1">1</button>
    <button type="button" data-k="2">2</button>
    <button type="button" data-k="3">3</button>
    <button type="button" data-k="4">4</button>
    <button type="button" data-k="5">5</button>
    <button type="button" data-k="6">6</button>
    <button type="button" data-k="7">7</button>
    <button type="button" data-k="8">8</button>
    <button type="button" data-k="9">9</button>
    <button type="button" data-k="del">⌫</button>
    <button type="button" data-k="0">0</button>
    <button type="button" class="np-go" data-k="go">Go</button>
  </div>
</div>

<!-- shown only if the pages can't be fetched (see js/main.js) -->
<div id="bookError" role="alert" aria-live="polite"></div>

<script type="module">
  /* window.__BUST (set above, in <head>) makes this — and every internal
     import inside js/main.js and the other js/*.js modules — always fetch
     fresh. See the caching note in <head> for how to revert this later. */
  import('./js/main.js?v=' + window.__BUST);
</script>
</body>
</html>
